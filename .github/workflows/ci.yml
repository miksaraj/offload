name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install FFmpeg dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libavutil-dev libavformat-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev libavcodec-dev \
            pkg-config ffmpeg

      - name: Install ONNX Runtime shared library
        run: |
          curl -sSL -o onnxruntime.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
          tar -xzf onnxruntime.tgz
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime-linux-x64-1.24.4/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Download ONNX models
        run: models/download.sh

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace
